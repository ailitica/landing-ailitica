name: Indexacion Google

on:
  push:
    branches:
      - main
    paths:
      - 'blog/*.html'

# Excluye blog/index.html y cualquier HTML de _staging/_templates.
# El filtro de paths arriba es un gating general (Actions solo dispara si
# hay cambios en blog/*.html); luego el step "Detectar URLs" filtra finamente
# via git diff.

jobs:
  notify-google:
    name: Notificar Google Indexing API
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout con historial para diff
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Detectar URLs canonicas a notificar
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          # Diff entre HEAD~1 y HEAD. En el primer commit de un repo no existira
          # HEAD~1; en ese caso no hay nada que notificar.
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "Primer commit sin padre: no hay diff que procesar."
            echo "urls=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Solo HTML de blog/ anadidos (A) o modificados (M).
          # Excluye index.html (lo regenera el CI de posts).
          changed=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD \
            | grep -E '^blog/[^/]+\.html$' \
            | grep -v '^blog/index\.html$' \
            | grep -v '^blog/_' \
            || true)

          if [ -z "$changed" ]; then
            echo "No hay posts nuevos ni modificados en este push."
            echo "urls=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Ficheros detectados:"
          echo "$changed"

          # Construye URLs canonicas.
          urls=""
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            base=$(basename "$path")
            url="https://ailitica.com/blog/$base"
            urls+="$url"$'\n'
          done <<< "$changed"

          # Guarda en un fichero para el step siguiente (multilinea seguro).
          printf '%s' "$urls" > urls.txt
          echo "URLs a notificar:"
          cat urls.txt

      - name: Escribir credencial en RUNNER_TEMP
        if: hashFiles('urls.txt') != ''
        env:
          GCP_INDEXING_SA_JSON: ${{ secrets.GCP_INDEXING_SA_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GCP_INDEXING_SA_JSON:-}" ]; then
            echo "::error::Secret GCP_INDEXING_SA_JSON no esta configurado en este repo."
            echo "::error::Configurar en Settings > Secrets and variables > Actions."
            exit 1
          fi
          printf '%s' "$GCP_INDEXING_SA_JSON" > "$RUNNER_TEMP/sa.json"
          chmod 600 "$RUNNER_TEMP/sa.json"
          # Verificacion rapida: debe parsear como JSON.
          python -c "import json,sys; json.load(open('$RUNNER_TEMP/sa.json'))" \
            || { echo "::error::GCP_INDEXING_SA_JSON no es JSON valido."; exit 1; }
          echo "Credencial escrita en \$RUNNER_TEMP/sa.json"

      - name: Notificar Google Indexing API
        if: hashFiles('urls.txt') != ''
        env:
          SA_JSON_PATH: ${{ runner.temp }}/sa.json
        run: |
          set -euo pipefail
          cat urls.txt | python .github/workflows/scripts/notify_indexing.py --stdin

      - name: Limpiar credencial
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/sa.json" || true

      - name: Resumen
        if: always()
        run: |
          if [ -f urls.txt ]; then
            echo "### URLs notificadas" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat urls.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No se detectaron URLs que notificar en este push." >> "$GITHUB_STEP_SUMMARY"
          fi
